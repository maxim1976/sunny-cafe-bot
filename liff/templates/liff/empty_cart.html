<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sunny Cafe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">
  <div class="text-center p-4">
    <div class="fs-1 mb-3">🛒</div>
    <h5>{% if lang == 'en' %}Your cart is empty{% else %}購物車是空的{% endif %}</h5>
    <p class="text-muted">{% if lang == 'en' %}Please select items from the menu first.{% else %}請先從菜單選擇品項。{% endif %}</p>
    <button class="btn btn-primary mt-2" onclick="liff.init({liffId:'{{liff_id}}'}).then(()=>liff.closeWindow())">
      {% if lang == 'en' %}Close{% else %}關閉{% endif %}
    </button>
  </div>
</body>
</html>
