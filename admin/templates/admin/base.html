<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sunny Cafe Admin{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root { --amber: #C8A165; --coffee: #6B4226; --cream: #F5E6CC; }
    .sidebar { width: 220px; min-height: 100vh; background: var(--coffee); }
    .sidebar .nav-link { color: var(--cream); border-radius: .375rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
    .sidebar-brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,.2); }
    .badge-pending  { background: #ffc107; color:#000; }
    .badge-ready    { background: #0d6efd; }
    .badge-done     { background: #198754; }
    .badge-cancelled{ background: #dc3545; }
    .toggle-available { cursor:pointer; }
  </style>
</head>
<body class="bg-light">
<div class="d-flex">

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-2">
    <div class="sidebar-brand">☀️ Sunny Cafe</div>
    <nav class="nav flex-column mt-3 gap-1">
      <a class="nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}"
         href="{{ url_for('admin.dashboard') }}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
      <a class="nav-link {% if request.endpoint and 'menu' in request.endpoint %}active{% endif %}"
         href="{{ url_for('admin.menu') }}"><i class="bi bi-journal-text me-2"></i>Menu</a>
      <a class="nav-link {% if request.endpoint and 'discount' in request.endpoint %}active{% endif %}"
         href="{{ url_for('admin.discounts') }}"><i class="bi bi-tag me-2"></i>Discounts</a>
      <a class="nav-link {% if request.endpoint and 'post' in request.endpoint %}active{% endif %}"
         href="{{ url_for('admin.posts') }}"><i class="bi bi-megaphone me-2"></i>Posts</a>
      <a class="nav-link {% if request.endpoint == 'admin.store' %}active{% endif %}"
         href="{{ url_for('admin.store') }}"><i class="bi bi-shop me-2"></i>Store Info</a>
      <a class="nav-link {% if request.endpoint and 'order' in request.endpoint %}active{% endif %}"
         href="{{ url_for('admin.orders') }}"><i class="bi bi-receipt me-2"></i>Orders</a>
    </nav>
  </div>

  <!-- Main content -->
  <div class="flex-grow-1 p-4">
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ 'success' if cat == 'success' else 'warning' }} alert-dismissible fade show">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.querySelectorAll('form[method="post"]').forEach(function(f){
    if(!f.querySelector('[name="csrf_token"]')){
      var i=document.createElement('input');
      i.type='hidden';i.name='csrf_token';i.value='{{ csrf_token() }}';
      f.prepend(i);
    }
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
