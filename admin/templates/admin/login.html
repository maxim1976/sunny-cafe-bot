<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sunny Cafe Admin — Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <style>
      :root { --coffee: #6b4226; --amber: #c8a165; --cream: #f5e6cc; }
      body { background: var(--cream); }
      .login-card {
        max-width: 380px;
        margin: 8vh auto 0;
        border: none;
        border-radius: 1rem;
        box-shadow: 0 4px 24px rgba(107,66,38,.15);
      }
      .login-header {
        background: var(--coffee);
        color: #fff;
        border-radius: 1rem 1rem 0 0;
        padding: 2rem;
        text-align: center;
      }
      .btn-login { background: var(--coffee); color: #fff; border: none; }
      .btn-login:hover { background: #4e2f1a; color: #fff; }
    </style>
  </head>
  <body>
    <div class="login-card card">
      <div class="login-header">
        <div style="font-size:2.5rem">☀️</div>
        <h4 class="mb-0 mt-2">Sunny Cafe Admin</h4>
      </div>
      <div class="card-body p-4">
        {% with messages = get_flashed_messages(with_categories=True) %}
          {% for cat, msg in messages %}
            <div class="alert alert-warning py-2">{{ msg }}</div>
          {% endfor %}
        {% endwith %}
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" autofocus required />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required />
          </div>
          <button type="submit" class="btn btn-login w-100">Sign in</button>
        </form>
      </div>
    </div>
  </body>
</html>
